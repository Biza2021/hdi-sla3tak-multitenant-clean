<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${currentLanguage}" th:dir="${textDirection}">
<head th:replace="~{fragments/head :: appHead(#{page.title.dashboard})}"></head>
<body class="dashboard-page">
<main class="page-shell">
    <div th:replace="~{fragments/ui :: tenantHeader(${shop}, 'dashboard')}"></div>

    <section class="dashboard-hero dashboard-hero--phase2">
        <div class="dashboard-hero__copy">
            <div class="panel-topline">
                <span class="eyebrow" th:text="#{dashboard.hero.eyebrow}"></span>
                <span class="role-chip" th:text="${#messages.msg('user.role.' + currentUser.role.name())}"></span>
            </div>
            <h1 th:text="#{dashboard.hero.title}"></h1>
        </div>
        <div class="dashboard-hero__actions">
            <a class="button button--ghost" th:href="@{|/${shop.slug}/delivery|}" th:text="#{tenant.nav.delivery}"></a>
            <a class="button button--ghost" th:href="@{|/${shop.slug}/customers|}" th:text="#{tenant.nav.customers}"></a>
            <a class="button button--primary" th:href="@{|/${shop.slug}/items/new|}" th:text="#{dashboard.hero.cta}"></a>
        </div>
    </section>

    <section class="metric-grid">
        <article class="metric-card">
            <span class="metric-label" th:text="#{dashboard.metric.totalCustomers.label}"></span>
            <strong class="metric-value" th:text="${dashboard.totalCustomers}"></strong>
        </article>
        <article class="metric-card">
            <span class="metric-label" th:text="#{dashboard.metric.activeRepairs.label}"></span>
            <strong class="metric-value" th:text="${dashboard.activeRepairs}"></strong>
        </article>
        <article class="metric-card">
            <span class="metric-label" th:text="#{dashboard.metric.readyForPickup.label}"></span>
            <strong class="metric-value" th:text="${dashboard.readyForPickup}"></strong>
        </article>
        <article class="metric-card">
            <span class="metric-label" th:text="#{dashboard.metric.deliveredRecently.label}"></span>
            <strong class="metric-value" th:text="${dashboard.deliveredRecently}"></strong>
        </article>
    </section>

    <section class="section-card">
        <div class="section-card__header">
            <div class="section-card__copy">
                <span class="section-kicker" th:text="#{dashboard.recent.eyebrow}"></span>
                <h2 th:text="#{dashboard.recent.title}"></h2>
            </div>
            <a class="button button--ghost" th:href="@{|/${shop.slug}/items|}" th:text="#{dashboard.recent.viewAll}"></a>
        </div>

        <div class="empty-state" th:if="${dashboard.recentRepairs.isEmpty()}">
            <h3 th:text="#{dashboard.recent.empty.title}"></h3>
            <p th:text="#{dashboard.recent.empty.body}"></p>
            <a class="button button--primary" th:href="@{|/${shop.slug}/items/new|}" th:text="#{dashboard.hero.cta}"></a>
        </div>

        <div class="entity-list" th:if="${!dashboard.recentRepairs.isEmpty()}">
            <article class="entity-row" th:each="repair : ${dashboard.recentRepairs}">
                <div class="entity-row__main">
                    <div class="entity-row__title-group">
                        <a class="entity-row__title"
                           th:href="@{|/${shop.slug}/items/${repair.id}|}"
                           th:text="${repair.title}"></a>
                        <p class="entity-row__subtitle" th:text="${repair.customerName}"></p>
                    </div>
                    <span class="status-badge"
                          th:classappend="| status--${repair.status.name()}|"
                          th:text="${#messages.msg('repair.status.' + repair.status.name())}"></span>
                </div>
                <div class="entity-row__meta">
                    <div class="meta-pill">
                        <span th:text="#{dashboard.recent.expected}"></span>
                        <strong th:if="${repair.expectedDeliveryDate != null}"
                                th:text="${#temporals.format(repair.expectedDeliveryDate, #messages.msg('format.date'))}"></strong>
                        <strong th:if="${repair.expectedDeliveryDate == null}" th:text="#{app.notAvailable}"></strong>
                    </div>
                    <div class="meta-pill">
                        <span th:text="#{dashboard.recent.balance}"></span>
                        <strong th:text="${#numbers.formatDecimal(repair.remainingBalance, 1, 2)}"></strong>
                    </div>
                    <div class="meta-pill">
                        <span th:text="#{dashboard.recent.updated}"></span>
                        <strong th:text="${#temporals.format(repair.updatedAt, #messages.msg('format.dateTime'))}"></strong>
                    </div>
                </div>
            </article>
        </div>
    </section>

    <div th:replace="~{fragments/ui :: tenantBottomUtility(${shop})}"></div>
</main>
</body>
</html>
