<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${currentLanguage}" th:dir="${textDirection}">
<head th:replace="~{fragments/head :: appHead(#{page.title.publicTracking})}"></head>
<body class="auth-page">
<main class="auth-shell auth-shell--single auth-shell--compact public-shell">
    <div th:replace="~{fragments/ui :: languageSwitcher(${currentPath})}"></div>

    <section class="hero-panel hero-panel--intro public-panel">
        <div class="panel-topline">
            <span class="eyebrow" th:text="#{tracking.detail.eyebrow}"></span>
            <span class="context-chip" th:text="${tracking.shopBusinessName}"></span>
        </div>

        <div class="hero-copy">
            <h1 th:text="${tracking.title}"></h1>
        </div>

        <div class="repair-image-panel public-panel__media" th:if="${tracking.hasImage}">
            <img class="repair-image public-panel__image"
                 th:src="@{|/track/${tracking.publicTrackingToken}/image|}"
                 th:alt="${tracking.title}">
        </div>
        <div class="empty-state public-panel__placeholder" th:if="${!tracking.hasImage}">
            <h3 th:text="#{tracking.detail.image.empty.title}"></h3>
            <p th:text="#{tracking.detail.image.empty.body}"></p>
        </div>

        <div class="info-grid public-info-grid">
            <div class="info-item">
                <span th:text="#{tracking.detail.shop}"></span>
                <strong th:text="${tracking.shopBusinessName}"></strong>
            </div>
            <div class="info-item">
                <span th:text="#{tracking.detail.status}"></span>
                <strong class="status-badge"
                        th:classappend="| status--${tracking.status.name()}|"
                        th:text="${#messages.msg('repair.status.' + tracking.status.name())}"></strong>
            </div>
            <div class="info-item">
                <span th:text="#{tracking.detail.expectedDeliveryDate}"></span>
                <strong th:text="${tracking.expectedDeliveryDate != null ? #temporals.format(tracking.expectedDeliveryDate, #messages.msg('format.date')) : #messages.msg('app.notAvailable')}"></strong>
            </div>
            <div class="info-item">
                <span th:text="#{tracking.detail.pickupCode}"></span>
                <strong th:text="${tracking.pickupCode}"></strong>
            </div>
        </div>
    </section>
</main>
</body>
</html>
