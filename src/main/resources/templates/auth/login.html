<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: appHead('Sign In')}"></head>
<body class="auth-page">
<main class="auth-shell auth-shell--single">
    <section class="auth-card">
        <span class="eyebrow" th:text="${shop.businessName}">Shop</span>
        <h1>Sign in to your repair workspace.</h1>
        <p class="lede">
            Tenant-aware authentication checks your username and password inside
            <strong th:text="${shop.slug}">shop-slug</strong>.
        </p>

        <div class="notice success" th:if="${param.created != null}">
            Shop created successfully. Sign in to continue.
        </div>
        <div class="notice success" th:if="${param.loggedOut != null}">
            You have been signed out.
        </div>
        <div class="notice error" th:if="${#fields.hasGlobalErrors()}">
            <span th:each="err : ${#fields.globalErrors()}" th:text="${err}">Incorrect username or password.</span>
        </div>

        <form th:action="@{|/${shop.slug}/login|}" th:object="${loginForm}" method="post" class="stack">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <label class="field">
                <span>Username</span>
                <input type="text" th:field="*{username}" placeholder="amina" autocomplete="username">
                <small th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></small>
            </label>

            <label class="field">
                <span>Password</span>
                <input type="password" th:field="*{password}" placeholder="Your password" autocomplete="current-password">
                <small th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></small>
            </label>

            <button class="button button--primary button--block" type="submit">Sign In</button>
        </form>
    </section>
</main>
</body>
</html>
