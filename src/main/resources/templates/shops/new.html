<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${currentLanguage}" th:dir="${textDirection}">
<head th:replace="~{fragments/head :: appHead(#{page.title.shopCreate})}"></head>
<body class="auth-page auth-page--onboarding">
<main class="auth-shell auth-shell--balanced">
    <div th:replace="~{fragments/ui :: languageSwitcher(${currentPath})}"></div>
    <section class="hero-panel hero-panel--intro">
        <div class="panel-topline">
            <span class="eyebrow" th:text="#{app.brand}"></span>
            <span class="context-chip" th:text="${currentPath}"></span>
        </div>
        <div class="hero-copy">
            <h1 th:text="#{onboarding.hero.title}"></h1>
            <p class="lede" th:text="#{onboarding.hero.lede}"></p>
        </div>
        <div class="hero-notes">
            <div class="hero-note">
                <strong th:text="#{onboarding.hero.note1.title}"></strong>
                <span th:text="#{onboarding.hero.note1.body}"></span>
            </div>
            <div class="hero-note">
                <strong th:text="#{onboarding.hero.note2.title}"></strong>
                <span th:text="#{onboarding.hero.note2.body}"></span>
            </div>
            <div class="hero-note">
                <strong th:text="#{onboarding.hero.note3.title}"></strong>
                <span th:text="#{onboarding.hero.note3.body}"></span>
            </div>
        </div>
    </section>

    <section class="auth-card auth-card--form">
        <div class="card-heading">
            <span class="eyebrow" th:text="#{onboarding.form.eyebrow}"></span>
            <h2 th:text="#{onboarding.form.title}"></h2>
            <p class="muted-copy" th:text="#{onboarding.form.lede}"></p>
        </div>

        <form th:action="@{/shops/new}" th:object="${shopRegistrationForm}" method="post" class="stack">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <label class="field">
                <span th:text="#{onboarding.form.businessName.label}"></span>
                <input type="text" th:field="*{businessName}" th:placeholder="#{onboarding.form.businessName.placeholder}">
                <small th:if="${#fields.hasErrors('businessName')}" th:errors="*{businessName}"></small>
            </label>

            <label class="field">
                <span th:text="#{onboarding.form.slug.label}"></span>
                <div class="input-hint">
                    <input type="text" th:field="*{slug}" th:placeholder="#{onboarding.form.slug.placeholder}">
                    <em th:with="loginExample='/atlas-repair/login'" th:text="#{onboarding.form.slug.hint(${loginExample})}"></em>
                </div>
                <small th:if="${#fields.hasErrors('slug')}" th:errors="*{slug}"></small>
            </label>

            <label class="field">
                <span th:text="#{onboarding.form.ownerFullName.label}"></span>
                <input type="text" th:field="*{ownerFullName}" th:placeholder="#{onboarding.form.ownerFullName.placeholder}">
                <small th:if="${#fields.hasErrors('ownerFullName')}" th:errors="*{ownerFullName}"></small>
            </label>

            <label class="field">
                <span th:text="#{onboarding.form.ownerUsername.label}"></span>
                <input type="text" th:field="*{ownerUsername}" th:placeholder="#{onboarding.form.ownerUsername.placeholder}">
                <small th:if="${#fields.hasErrors('ownerUsername')}" th:errors="*{ownerUsername}"></small>
            </label>

            <label class="field">
                <span th:text="#{onboarding.form.ownerPassword.label}"></span>
                <input type="password" th:field="*{ownerPassword}" th:placeholder="#{onboarding.form.ownerPassword.placeholder}">
                <small th:if="${#fields.hasErrors('ownerPassword')}" th:errors="*{ownerPassword}"></small>
            </label>

            <button class="button button--primary button--block" type="submit" th:text="#{onboarding.form.submit}"></button>
        </form>
    </section>
</main>
</body>
</html>
