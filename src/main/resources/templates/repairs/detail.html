<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${currentLanguage}" th:dir="${textDirection}">
<head th:replace="~{fragments/head :: appHead(#{page.title.repairDetail})}"></head>
<body class="dashboard-page">
<main class="page-shell">
    <div th:replace="~{fragments/ui :: tenantHeader(${shop}, 'items')}"></div>

    <section class="page-hero">
        <div class="page-hero__copy">
            <span class="section-kicker" th:text="#{repairs.detail.eyebrow}"></span>
            <h1 th:text="${repair.title}"></h1>
            <p class="muted-copy" th:text="${repair.customer.fullName}"></p>
        </div>
        <div class="page-hero__actions">
            <a class="button button--ghost" th:href="@{|/${shop.slug}/items|}" th:text="#{common.backToList}"></a>
            <a class="button button--primary" th:href="@{|/${shop.slug}/items/${repair.id}/edit|}" th:text="#{common.edit}"></a>
        </div>
    </section>

    <section class="detail-grid">
        <article class="detail-card">
            <span class="section-kicker" th:text="#{repairs.detail.summary.title}"></span>
            <div class="info-grid">
                <div class="info-item">
                    <span th:text="#{repairs.field.status}"></span>
                    <strong class="status-badge"
                            th:classappend="| status--${repair.status.name()}|"
                            th:text="${#messages.msg('repair.status.' + repair.status.name())}"></strong>
                </div>
                <div class="info-item">
                    <span th:text="#{repairs.field.customer}"></span>
                    <strong th:text="${repair.customer.fullName}"></strong>
                </div>
                <div class="info-item">
                    <span th:text="#{repairs.field.pickupCode}"></span>
                    <strong th:text="${repair.pickupCode}"></strong>
                </div>
                <div class="info-item">
                    <span th:text="#{repairs.field.expectedDeliveryDate}"></span>
                    <strong th:text="${repair.expectedDeliveryDate != null ? #temporals.format(repair.expectedDeliveryDate, #messages.msg('format.date')) : #messages.msg('app.notAvailable')}"></strong>
                </div>
            </div>
        </article>

        <article class="detail-card">
            <span class="section-kicker" th:text="#{repairs.detail.financials.title}"></span>
            <div class="info-grid">
                <div class="info-item">
                    <span th:text="#{repairs.field.estimatedPrice}"></span>
                    <strong th:text="${#numbers.formatDecimal(repair.estimatedPrice, 1, 2)}"></strong>
                </div>
                <div class="info-item">
                    <span th:text="#{repairs.field.depositPaid}"></span>
                    <strong th:text="${#numbers.formatDecimal(repair.depositPaid, 1, 2)}"></strong>
                </div>
                <div class="info-item">
                    <span th:text="#{repairs.field.remainingBalance}"></span>
                    <strong th:text="${#numbers.formatDecimal(repair.remainingBalance, 1, 2)}"></strong>
                </div>
            </div>
        </article>

        <article class="detail-card">
            <span class="section-kicker" th:text="#{repairs.detail.image.title}"></span>
            <div class="repair-image-panel" th:if="${repair.image != null}">
                <img class="repair-image"
                     th:src="@{|/${shop.slug}/items/${repair.id}/image|}"
                     th:alt="${repair.title}">
            </div>
            <div class="empty-state" th:if="${repair.image == null}">
                <h3 th:text="#{repairs.detail.image.empty.title}"></h3>
                <p th:text="#{repairs.detail.image.empty.body}"></p>
            </div>
        </article>

        <article class="detail-card">
            <span class="section-kicker" th:text="#{repairs.detail.tracking.title}"></span>
            <div class="page-hero__actions">
                <a class="button button--ghost"
                   th:href="@{|/track/${repair.publicTrackingToken}|}"
                   target="_blank"
                   rel="noopener"
                   th:text="#{repairs.detail.tracking.open}"></a>
                <button class="button button--ghost button--compact"
                        type="button"
                        data-communication-open="tracking"
                        th:text="#{communication.open.tracking}"></button>
                <button class="button button--ghost button--compact"
                        type="button"
                        data-communication-open="pickup"
                        th:if="${pickupLinks != null}"
                        th:text="#{communication.open.pickup}"></button>
            </div>
        </article>

        <article class="detail-card">
            <span class="section-kicker" th:text="#{repairs.field.description}"></span>
            <p th:text="${repair.description != null ? repair.description : #messages.msg('repairs.detail.description.empty')}"></p>
        </article>

        <article class="detail-card">
            <span class="section-kicker" th:text="#{repairs.field.repairNotes}"></span>
            <p th:text="${repair.repairNotes != null ? repair.repairNotes : #messages.msg('repairs.detail.repairNotes.empty')}"></p>
        </article>
    </section>

    <section class="section-card">
        <div class="section-card__header">
            <div class="section-card__copy">
                <span class="section-kicker" th:text="#{repairs.detail.history.eyebrow}"></span>
                <h2 th:text="#{repairs.detail.history.title}"></h2>
            </div>
        </div>

        <div class="timeline">
            <article class="timeline-entry" th:each="entry : ${repair.history}">
                <div class="timeline-entry__marker"></div>
                <div class="timeline-entry__body">
                    <div class="timeline-entry__header">
                        <span class="status-badge"
                              th:classappend="| status--${entry.status.name()}|"
                              th:text="${#messages.msg('repair.status.' + entry.status.name())}"></span>
                        <strong th:text="${#temporals.format(entry.createdAt, #messages.msg('format.dateTime'))}"></strong>
                    </div>
                    <p class="timeline-entry__meta"
                       th:text="${entry.changedByName != null ? entry.changedByName : #messages.msg('repairs.detail.history.system')}"></p>
                    <p th:if="${entry.notes != null}" th:text="${entry.notes}"></p>
                </div>
            </article>
        </div>
    </section>

    <div th:replace="~{fragments/ui :: tenantBottomUtility(${shop})}"></div>
</main>

<div class="modal-backdrop"
     hidden
     data-communication-modal
     aria-hidden="true"
     th:attr="
        data-auto-open=${communicationPrompt},
        data-tracking-title=#{communication.prompt.tracking.title},
        data-tracking-body=#{communication.prompt.tracking.body},
        data-tracking-phone=${trackingLinks != null ? trackingLinks.targetPhone : ''},
        data-tracking-whatsapp=${trackingLinks != null ? trackingLinks.whatsappUrl : ''},
        data-tracking-sms=${trackingLinks != null ? trackingLinks.smsUrl : ''},
        data-pickup-title=#{communication.prompt.pickup.title},
        data-pickup-body=#{communication.prompt.pickup.body},
        data-pickup-phone=${pickupLinks != null ? pickupLinks.targetPhone : ''},
        data-pickup-whatsapp=${pickupLinks != null ? pickupLinks.whatsappUrl : ''},
        data-pickup-sms=${pickupLinks != null ? pickupLinks.smsUrl : ''},
        data-whatsapp-label=#{communication.channel.whatsapp},
        data-sms-label=#{communication.channel.sms},
        data-cancel-label=#{common.cancel},
        data-target-label=#{communication.targetPhone},
        data-unavailable-label=#{communication.prompt.unavailable}">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="communication-modal-title">
        <div class="modal-card__header">
            <div class="section-card__copy">
                <span class="section-kicker" th:text="#{communication.section.eyebrow}"></span>
                <h2 id="communication-modal-title"></h2>
            </div>
        </div>
        <p class="modal-card__body" data-communication-body></p>
        <p class="communication-target" hidden data-communication-phone-row>
            <span data-communication-target-label></span>
            <strong data-communication-phone></strong>
        </p>
        <p class="communication-unavailable" hidden data-communication-unavailable></p>
        <div class="modal-card__actions">
            <a class="button button--whatsapp" target="_blank" rel="noopener" data-communication-whatsapp></a>
            <a class="button button--sms" data-communication-sms></a>
            <button class="button button--ghost" type="button" data-communication-close></button>
        </div>
    </div>
</div>

<script th:inline="javascript">
    (() => {
        const modal = document.querySelector('[data-communication-modal]');
        if (!modal) {
            return;
        }

        const title = modal.querySelector('#communication-modal-title');
        const body = modal.querySelector('[data-communication-body]');
        const phoneRow = modal.querySelector('[data-communication-phone-row]');
        const targetLabel = modal.querySelector('[data-communication-target-label]');
        const phone = modal.querySelector('[data-communication-phone]');
        const unavailable = modal.querySelector('[data-communication-unavailable]');
        const whatsapp = modal.querySelector('[data-communication-whatsapp]');
        const sms = modal.querySelector('[data-communication-sms]');
        const closeButton = modal.querySelector('[data-communication-close]');
        const triggers = document.querySelectorAll('[data-communication-open]');
        const configs = {
            tracking: {
                title: modal.dataset.trackingTitle,
                body: modal.dataset.trackingBody,
                phone: modal.dataset.trackingPhone,
                whatsappUrl: modal.dataset.trackingWhatsapp,
                smsUrl: modal.dataset.trackingSms
            },
            pickup: {
                title: modal.dataset.pickupTitle,
                body: modal.dataset.pickupBody,
                phone: modal.dataset.pickupPhone,
                whatsappUrl: modal.dataset.pickupWhatsapp,
                smsUrl: modal.dataset.pickupSms
            }
        };

        const setAction = (link, label, url) => {
            link.textContent = label;
            if (url) {
                link.href = url;
                link.classList.remove('button--disabled');
                link.removeAttribute('aria-disabled');
                link.tabIndex = 0;
            } else {
                link.removeAttribute('href');
                link.classList.add('button--disabled');
                link.setAttribute('aria-disabled', 'true');
                link.tabIndex = -1;
            }
        };

        const openModal = (kind) => {
            const config = configs[kind];
            if (!config) {
                return;
            }

            title.textContent = config.title || '';
            body.textContent = config.body || '';
            targetLabel.textContent = modal.dataset.targetLabel || '';
            phone.textContent = config.phone || '';
            phoneRow.hidden = !config.phone;
            unavailable.textContent = modal.dataset.unavailableLabel || '';
            unavailable.hidden = Boolean(config.whatsappUrl || config.smsUrl);
            setAction(whatsapp, modal.dataset.whatsappLabel || 'WhatsApp', config.whatsappUrl);
            setAction(sms, modal.dataset.smsLabel || 'SMS', config.smsUrl);
            closeButton.textContent = modal.dataset.cancelLabel || 'Cancel';
            modal.removeAttribute('hidden');
            modal.setAttribute('aria-hidden', 'false');
            document.body.classList.add('modal-open');
        };

        const closeModal = () => {
            modal.setAttribute('hidden', 'hidden');
            modal.setAttribute('aria-hidden', 'true');
            document.body.classList.remove('modal-open');
        };

        const handleCloseInteraction = (event) => {
            if (event) {
                event.preventDefault();
                event.stopPropagation();
            }
            closeModal();
        };

        triggers.forEach((trigger) => {
            trigger.addEventListener('click', () => {
                openModal(trigger.dataset.communicationOpen);
            });
        });

        closeButton.addEventListener('click', handleCloseInteraction);
        whatsapp.addEventListener('click', closeModal);
        sms.addEventListener('click', closeModal);
        modal.addEventListener('click', (event) => {
            if (event.target === modal) {
                handleCloseInteraction(event);
            }
        });

        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape' && !modal.hasAttribute('hidden')) {
                handleCloseInteraction(event);
            }
        });

        if (modal.dataset.autoOpen) {
            const autoOpenKind = modal.dataset.autoOpen;
            modal.dataset.autoOpen = '';
            openModal(autoOpenKind);
        }
    })();
</script>
</body>
</html>
