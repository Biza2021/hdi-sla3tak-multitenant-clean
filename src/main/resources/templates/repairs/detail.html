<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${currentLanguage}" th:dir="${textDirection}">
<head th:replace="~{fragments/head :: appHead(#{page.title.repairDetail})}"></head>
<body class="dashboard-page">
<main class="page-shell">
    <div th:replace="~{fragments/ui :: tenantHeader(${shop}, 'items')}"></div>

    <section class="page-hero">
        <div class="page-hero__copy">
            <span class="section-kicker" th:text="#{repairs.detail.eyebrow}"></span>
            <h1 th:text="${repair.title}"></h1>
            <p class="muted-copy" th:text="${repair.customer.fullName}"></p>
        </div>
        <div class="page-hero__actions">
            <a class="button button--ghost" th:href="@{|/${shop.slug}/items|}" th:text="#{common.backToList}"></a>
            <a class="button button--primary" th:href="@{|/${shop.slug}/items/${repair.id}/edit|}" th:text="#{common.edit}"></a>
        </div>
    </section>

    <section class="detail-grid">
        <article class="detail-card">
            <span class="section-kicker" th:text="#{repairs.detail.summary.title}"></span>
            <div class="info-grid">
                <div class="info-item">
                    <span th:text="#{repairs.field.status}"></span>
                    <strong class="status-badge"
                            th:classappend="| status--${repair.status.name()}|"
                            th:text="${#messages.msg('repair.status.' + repair.status.name())}"></strong>
                </div>
                <div class="info-item">
                    <span th:text="#{repairs.field.customer}"></span>
                    <strong th:text="${repair.customer.fullName}"></strong>
                </div>
                <div class="info-item">
                    <span th:text="#{repairs.field.pickupCode}"></span>
                    <strong th:text="${repair.pickupCode}"></strong>
                </div>
                <div class="info-item">
                    <span th:text="#{repairs.field.expectedDeliveryDate}"></span>
                    <strong th:text="${repair.expectedDeliveryDate != null ? #temporals.format(repair.expectedDeliveryDate, #messages.msg('format.date')) : #messages.msg('app.notAvailable')}"></strong>
                </div>
            </div>
        </article>

        <article class="detail-card">
            <span class="section-kicker" th:text="#{repairs.detail.financials.title}"></span>
            <div class="info-grid">
                <div class="info-item">
                    <span th:text="#{repairs.field.estimatedPrice}"></span>
                    <strong th:text="${#numbers.formatDecimal(repair.estimatedPrice, 1, 2)}"></strong>
                </div>
                <div class="info-item">
                    <span th:text="#{repairs.field.depositPaid}"></span>
                    <strong th:text="${#numbers.formatDecimal(repair.depositPaid, 1, 2)}"></strong>
                </div>
                <div class="info-item">
                    <span th:text="#{repairs.field.remainingBalance}"></span>
                    <strong th:text="${#numbers.formatDecimal(repair.remainingBalance, 1, 2)}"></strong>
                </div>
            </div>
        </article>

        <article class="detail-card">
            <span class="section-kicker" th:text="#{repairs.detail.image.title}"></span>
            <div class="repair-image-panel" th:if="${repair.image != null}">
                <img class="repair-image"
                     th:src="@{|/${shop.slug}/items/${repair.id}/image|}"
                     th:alt="${repair.title}">
            </div>
            <div class="empty-state" th:if="${repair.image == null}">
                <h3 th:text="#{repairs.detail.image.empty.title}"></h3>
                <p th:text="#{repairs.detail.image.empty.body}"></p>
            </div>
        </article>

        <article class="detail-card">
            <span class="section-kicker" th:text="#{repairs.detail.tracking.title}"></span>
            <div class="page-hero__actions">
                <a class="button button--ghost"
                   th:href="@{|/track/${repair.publicTrackingToken}|}"
                   target="_blank"
                   rel="noopener"
                   th:text="#{repairs.detail.tracking.open}"></a>
            </div>
        </article>

        <article class="detail-card">
            <span class="section-kicker" th:text="#{communication.section.eyebrow}"></span>
            <div class="communication-stack">
                <section class="communication-block">
                    <div class="communication-block__header">
                        <strong class="communication-block__title" th:text="#{communication.tracking.title}"></strong>
                        <span class="communication-target" th:if="${trackingLinks != null and trackingLinks.targetPhone != null}">
                            <span th:text="#{communication.targetPhone}"></span>
                            <strong th:text="${trackingLinks.targetPhone}"></strong>
                        </span>
                    </div>
                    <div class="communication-actions" th:if="${trackingLinks != null and trackingLinks.hasAnyLink()}">
                        <a class="button button--whatsapp"
                           th:if="${trackingLinks.hasWhatsApp()}"
                           th:href="${trackingLinks.whatsappUrl}"
                           target="_blank"
                           rel="noopener"
                           th:text="#{communication.channel.whatsapp}"></a>
                        <a class="button button--sms"
                           th:if="${trackingLinks.hasSms()}"
                           th:href="${trackingLinks.smsUrl}"
                           th:text="#{communication.channel.sms}"></a>
                    </div>
                    <div class="communication-actions" th:if="${trackingLinks == null or !trackingLinks.hasAnyLink()}">
                        <span class="button button--disabled" th:text="#{communication.channel.whatsapp}"></span>
                        <span class="button button--disabled" th:text="#{communication.channel.sms}"></span>
                    </div>
                    <p class="communication-unavailable"
                       th:if="${trackingLinks == null or !trackingLinks.hasAnyLink()}"
                       th:text="#{communication.phoneUnavailable}"></p>
                </section>

                <section class="communication-block" th:if="${pickupLinks != null}">
                    <div class="communication-block__header">
                        <strong class="communication-block__title" th:text="#{communication.pickup.title}"></strong>
                        <span class="communication-target" th:if="${pickupLinks.targetPhone != null}">
                            <span th:text="#{communication.targetPhone}"></span>
                            <strong th:text="${pickupLinks.targetPhone}"></strong>
                        </span>
                    </div>
                    <div class="communication-actions" th:if="${pickupLinks.hasAnyLink()}">
                        <a class="button button--whatsapp"
                           th:if="${pickupLinks.hasWhatsApp()}"
                           th:href="${pickupLinks.whatsappUrl}"
                           target="_blank"
                           rel="noopener"
                           th:text="#{communication.channel.whatsapp}"></a>
                        <a class="button button--sms"
                           th:if="${pickupLinks.hasSms()}"
                           th:href="${pickupLinks.smsUrl}"
                           th:text="#{communication.channel.sms}"></a>
                    </div>
                    <div class="communication-actions" th:if="${!pickupLinks.hasAnyLink()}">
                        <span class="button button--disabled" th:text="#{communication.channel.whatsapp}"></span>
                        <span class="button button--disabled" th:text="#{communication.channel.sms}"></span>
                    </div>
                    <p class="communication-unavailable"
                       th:if="${!pickupLinks.hasAnyLink()}"
                       th:text="#{communication.phoneUnavailable}"></p>
                </section>
            </div>
        </article>

        <article class="detail-card">
            <span class="section-kicker" th:text="#{repairs.field.description}"></span>
            <p th:text="${repair.description != null ? repair.description : #messages.msg('repairs.detail.description.empty')}"></p>
        </article>

        <article class="detail-card">
            <span class="section-kicker" th:text="#{repairs.field.repairNotes}"></span>
            <p th:text="${repair.repairNotes != null ? repair.repairNotes : #messages.msg('repairs.detail.repairNotes.empty')}"></p>
        </article>
    </section>

    <section class="section-card">
        <div class="section-card__header">
            <div class="section-card__copy">
                <span class="section-kicker" th:text="#{repairs.detail.history.eyebrow}"></span>
                <h2 th:text="#{repairs.detail.history.title}"></h2>
            </div>
        </div>

        <div class="timeline">
            <article class="timeline-entry" th:each="entry : ${repair.history}">
                <div class="timeline-entry__marker"></div>
                <div class="timeline-entry__body">
                    <div class="timeline-entry__header">
                        <span class="status-badge"
                              th:classappend="| status--${entry.status.name()}|"
                              th:text="${#messages.msg('repair.status.' + entry.status.name())}"></span>
                        <strong th:text="${#temporals.format(entry.createdAt, #messages.msg('format.dateTime'))}"></strong>
                    </div>
                    <p class="timeline-entry__meta"
                       th:text="${entry.changedByName != null ? entry.changedByName : #messages.msg('repairs.detail.history.system')}"></p>
                    <p th:if="${entry.notes != null}" th:text="${entry.notes}"></p>
                </div>
            </article>
        </div>
    </section>

    <div th:replace="~{fragments/ui :: tenantBottomUtility(${shop})}"></div>
</main>
</body>
</html>
