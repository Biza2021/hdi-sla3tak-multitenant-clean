<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${currentLanguage}" th:dir="${textDirection}">
<head th:replace="~{fragments/head :: appHead(${editing} ? #{page.title.repairEdit} : #{page.title.repairNew})}"></head>
<body class="dashboard-page">
<main class="page-shell">
    <div th:replace="~{fragments/ui :: tenantHeader(${shop}, 'items')}"></div>

    <section class="page-hero">
        <div class="page-hero__copy">
            <span class="section-kicker" th:text="#{repairs.form.eyebrow}"></span>
            <h1 th:text="${editing} ? #{repairs.form.edit.title} : #{repairs.form.new.title}"></h1>
        </div>
    </section>

    <section class="form-layout form-layout--single">
        <section class="section-card section-card--form">
            <form th:action="${editing}
                    ? @{/{shopSlug}/items/{repairId}/edit(shopSlug=${shop.slug}, repairId=${repairId})}
                    : @{/{shopSlug}/items/new(shopSlug=${shop.slug})}"
                  th:object="${repairItemForm}"
                  method="post"
                  enctype="multipart/form-data"
                  class="stack"
                  data-money-form
                  th:attr="data-customer-suggestions-url=@{|/${shop.slug}/items/customer-suggestions|},
                           data-customer-quick-add-url=@{|/${shop.slug}/items/customers/quick-add|}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="form-grid">
                    <div class="field field--full customer-picker" data-customer-picker>
                        <span th:text="#{repairs.field.customer}"></span>
                        <input type="hidden" th:field="*{customerId}" data-customer-id>
                        <div class="input-hint">
                            <input type="text"
                                   id="repair-customer-search"
                                   autocomplete="off"
                                   spellcheck="false"
                                   aria-autocomplete="list"
                                   aria-controls="repair-customer-suggestions"
                                   aria-expanded="false"
                                   data-customer-query
                                   th:value="${selectedCustomer != null ? (selectedCustomer.primaryPhone != null ? selectedCustomer.fullName + ' - ' + selectedCustomer.primaryPhone : (selectedCustomer.secondaryPhone != null ? selectedCustomer.fullName + ' - ' + selectedCustomer.secondaryPhone : selectedCustomer.fullName)) : ''}"
                                   th:placeholder="#{repairs.form.customer.search.placeholder}">
                        </div>

                        <div class="selected-customer-card"
                             data-selected-customer
                             th:hidden="${selectedCustomer == null}">
                            <div class="selected-customer-card__copy">
                                <strong data-selected-customer-name
                                        th:text="${selectedCustomer != null ? selectedCustomer.fullName : ''}"></strong>
                                <span data-selected-customer-phones
                                      th:text="${selectedCustomer != null ? ((selectedCustomer.primaryPhone != null ? selectedCustomer.primaryPhone : '') + ((selectedCustomer.primaryPhone != null and selectedCustomer.secondaryPhone != null) ? ' • ' : '') + (selectedCustomer.secondaryPhone != null ? selectedCustomer.secondaryPhone : '')) : ''}"></span>
                            </div>
                            <button class="button button--ghost button--compact"
                                    type="button"
                                    data-customer-clear
                                    th:text="#{repairs.form.customer.clear}"
                                    th:hidden="${selectedCustomer == null}"></button>
                        </div>

                        <div class="autocomplete-panel"
                             id="repair-customer-suggestions"
                             hidden
                             data-customer-suggestions></div>

                        <div class="customer-picker__actions">
                            <button class="button button--ghost button--compact"
                                    type="button"
                                    data-customer-quick-add-open
                                    th:text="#{repairs.form.customer.quickAdd.open}"></button>
                            <a class="button button--ghost button--compact"
                               th:href="@{|/${shop.slug}/customers/new|}"
                               th:text="#{repairs.form.customer.quickAdd.fullPage}"></a>
                        </div>

                        <small th:if="${#fields.hasErrors('customerId')}" th:errors="*{customerId}"></small>

                        <section class="inline-quick-add"
                                 hidden
                                 data-customer-quick-add-panel>
                            <div class="section-card__copy">
                                <span class="section-kicker" th:text="#{repairs.form.customer.quickAdd.eyebrow}"></span>
                                <h2 th:text="#{repairs.form.customer.quickAdd.title}"></h2>
                            </div>
                            <div class="form-grid">
                                <label class="field">
                                    <span th:text="#{customers.field.fullName}"></span>
                                    <input type="text"
                                           data-quick-customer-field="fullName"
                                           th:placeholder="#{customers.placeholder.fullName}">
                                    <small hidden data-quick-customer-error="fullName"></small>
                                </label>

                                <label class="field">
                                    <span th:text="#{customers.field.primaryPhone}"></span>
                                    <input type="text"
                                           inputmode="tel"
                                           data-quick-customer-field="primaryPhone"
                                           th:placeholder="#{customers.placeholder.primaryPhone}">
                                    <small hidden data-quick-customer-error="primaryPhone"></small>
                                </label>

                                <label class="field">
                                    <span th:text="#{customers.field.secondaryPhone}"></span>
                                    <input type="text"
                                           inputmode="tel"
                                           data-quick-customer-field="secondaryPhone"
                                           th:placeholder="#{customers.placeholder.secondaryPhone}">
                                    <small hidden data-quick-customer-error="secondaryPhone"></small>
                                </label>

                                <label class="field field--full">
                                    <span th:text="#{customers.field.notes}"></span>
                                    <textarea rows="3"
                                              data-quick-customer-field="notes"
                                              th:placeholder="#{customers.placeholder.notes}"></textarea>
                                    <small hidden data-quick-customer-error="notes"></small>
                                </label>
                            </div>

                            <div class="notice error" hidden data-quick-customer-general-error></div>

                            <div class="form-actions form-actions--inline">
                                <button class="button button--ghost"
                                        type="button"
                                        data-customer-quick-add-cancel
                                        th:text="#{common.cancel}"></button>
                                <button class="button button--primary"
                                        type="button"
                                        data-customer-quick-add-submit
                                        th:text="#{repairs.form.customer.quickAdd.submit}"></button>
                            </div>
                        </section>
                    </div>

                    <label class="field">
                        <span th:text="#{repairs.field.status}"></span>
                        <select th:field="*{status}">
                            <option th:each="status : ${repairStatuses}"
                                    th:value="${status}"
                                    th:text="${#messages.msg('repair.status.' + status.name())}"></option>
                        </select>
                        <small th:if="${#fields.hasErrors('status')}" th:errors="*{status}"></small>
                    </label>

                    <label class="field field--full">
                        <span th:text="#{repairs.field.title}"></span>
                        <input type="text" th:field="*{title}" th:placeholder="#{repairs.placeholder.title}">
                        <small th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></small>
                    </label>

                    <label class="field field--full">
                        <span th:text="#{repairs.field.description}"></span>
                        <textarea th:field="*{description}" rows="4" th:placeholder="#{repairs.placeholder.description}"></textarea>
                        <small th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></small>
                    </label>

                    <label class="field field--full">
                        <span th:text="#{repairs.field.repairNotes}"></span>
                        <textarea th:field="*{repairNotes}" rows="5" th:placeholder="#{repairs.placeholder.repairNotes}"></textarea>
                        <small th:if="${#fields.hasErrors('repairNotes')}" th:errors="*{repairNotes}"></small>
                    </label>

                    <div class="field field--full field--file">
                        <span th:text="#{repairs.field.image}"></span>
                        <div class="compact-upload" th:classappend="${editing and existingImage != null} ? ' compact-upload--with-thumb' : ' compact-upload--empty'">
                            <div class="compact-upload__current" th:if="${editing and existingImage != null}">
                                <img class="compact-upload__thumb"
                                     th:src="@{|/${shop.slug}/items/${repairId}/image|}"
                                     th:alt="${repairItemForm.title != null ? repairItemForm.title : #messages.msg('repairs.detail.image.title')}">
                                <div class="compact-upload__copy">
                                    <strong th:text="#{repairs.form.image.current}"></strong>
                                    <span th:text="${existingImage.originalFilename}"></span>
                                </div>
                            </div>
                            <div class="compact-upload__current compact-upload__current--empty" th:if="${!editing or existingImage == null}">
                                <strong th:text="#{repairs.form.image.none}"></strong>
                            </div>

                            <input class="visually-hidden-input"
                                   type="file"
                                   id="repair-image-input"
                                   th:field="*{imageFile}"
                                   accept="image/jpeg,image/png,image/webp"
                                   data-image-input>

                            <div class="compact-upload__actions">
                                <label class="button button--ghost button--compact"
                                       for="repair-image-input"
                                       th:if="${editing and existingImage != null}"
                                       th:text="#{repairs.form.image.change}"></label>
                                <label class="button button--ghost button--compact"
                                       for="repair-image-input"
                                       th:if="${!editing or existingImage == null}"
                                       th:text="#{repairs.form.image.choose}"></label>
                                <span class="compact-upload__filename"
                                      data-image-filename
                                      th:text="${editing and existingImage != null ? existingImage.originalFilename : #messages.msg('repairs.form.image.none')}"></span>
                            </div>
                        </div>
                        <small th:if="${#fields.hasErrors('imageFile')}" th:errors="*{imageFile}"></small>
                    </div>

                    <label class="field">
                        <span th:text="#{repairs.field.expectedDeliveryDate}"></span>
                        <input type="date" th:field="*{expectedDeliveryDate}">
                        <small th:if="${#fields.hasErrors('expectedDeliveryDate')}" th:errors="*{expectedDeliveryDate}"></small>
                    </label>

                    <label class="field">
                        <span th:text="#{repairs.field.estimatedPrice}"></span>
                        <input type="number"
                               inputmode="decimal"
                               min="0"
                               step="0.01"
                               th:field="*{estimatedPrice}"
                               th:placeholder="#{repairs.placeholder.money}"
                               data-estimated-input>
                        <small th:if="${#fields.hasErrors('estimatedPrice')}" th:errors="*{estimatedPrice}"></small>
                    </label>

                    <label class="field">
                        <span th:text="#{repairs.field.depositPaid}"></span>
                        <input type="number"
                               inputmode="decimal"
                               min="0"
                               step="0.01"
                               th:field="*{depositPaid}"
                               th:placeholder="#{repairs.placeholder.money}"
                               data-paid-input>
                        <small th:if="${#fields.hasErrors('depositPaid')}" th:errors="*{depositPaid}"></small>
                    </label>

                    <label class="field">
                        <span th:text="#{repairs.field.remainingBalance}"></span>
                        <input type="number"
                               inputmode="decimal"
                               min="0"
                               step="0.01"
                               th:field="*{remainingBalance}"
                               th:placeholder="#{repairs.placeholder.money}"
                               readonly
                               aria-readonly="true"
                               data-remaining-input>
                        <em th:text="#{repairs.form.balance.auto}"></em>
                        <small th:if="${#fields.hasErrors('remainingBalance')}" th:errors="*{remainingBalance}"></small>
                    </label>
                </div>

                <div class="form-actions form-actions--sticky">
                    <a class="button button--ghost"
                       th:href="${editing}
                                ? @{/{shopSlug}/items/{repairId}(shopSlug=${shop.slug}, repairId=${repairId})}
                                : @{/{shopSlug}/items(shopSlug=${shop.slug})}"
                       th:text="#{common.cancel}"></a>
                    <button class="button button--primary"
                            type="submit"
                            th:text="${editing} ? #{repairs.form.edit.submit} : #{repairs.form.new.submit}"></button>
                </div>
            </form>
        </section>
    </section>

    <div th:replace="~{fragments/ui :: tenantBottomUtility(${shop})}"></div>
</main>
<script th:inline="javascript">
    (() => {
        const form = document.querySelector('[data-money-form]');
        if (!form) {
            return;
        }

        const csrfInput = form.querySelector('input[name="_csrf"], input[name="__RequestVerificationToken"], input[name="_csrf"]');
        const estimatedInput = form.querySelector('[data-estimated-input]');
        const paidInput = form.querySelector('[data-paid-input]');
        const remainingInput = form.querySelector('[data-remaining-input]');
        const imageInput = form.querySelector('[data-image-input]');
        const imageFilename = form.querySelector('[data-image-filename]');
        const customerIdInput = form.querySelector('[data-customer-id]');
        const customerQueryInput = form.querySelector('[data-customer-query]');
        const customerSuggestions = form.querySelector('[data-customer-suggestions]');
        const selectedCustomerCard = form.querySelector('[data-selected-customer]');
        const selectedCustomerName = form.querySelector('[data-selected-customer-name]');
        const selectedCustomerPhones = form.querySelector('[data-selected-customer-phones]');
        const clearCustomerButton = form.querySelector('[data-customer-clear]');
        const quickAddPanel = form.querySelector('[data-customer-quick-add-panel]');
        const quickAddOpenButton = form.querySelector('[data-customer-quick-add-open]');
        const quickAddCancelButton = form.querySelector('[data-customer-quick-add-cancel]');
        const quickAddSubmitButton = form.querySelector('[data-customer-quick-add-submit]');
        const quickAddGeneralError = form.querySelector('[data-quick-customer-general-error]');
        const customerSuggestionsUrl = form.dataset.customerSuggestionsUrl;
        const customerQuickAddUrl = form.dataset.customerQuickAddUrl;
        const defaultImageText = /*[[#{repairs.form.image.none}]]*/ 'No image';
        const customerSearchLoadingText = /*[[#{repairs.form.customer.search.loading}]]*/ 'Searching...';
        const customerSearchEmptyText = /*[[#{repairs.form.customer.search.empty}]]*/ 'No client found in this shop yet.';
        const quickAddErrorText = /*[[#{repairs.form.customer.quickAdd.error}]]*/ 'Unable to add this client right now. Please try again.';
        const customerNoPhoneText = /*[[#{app.notAvailable}]]*/ 'Not available';
        let selectedCustomer = customerIdInput.value
            ? {
                id: customerIdInput.value,
                fullName: selectedCustomerName?.textContent?.trim() || '',
                primaryPhone: '',
                secondaryPhone: '',
                displayLabel: customerQueryInput.value.trim()
            }
            : null;
        let customerAbortController = null;
        let customerDebounceHandle = null;
        let activeCustomerIndex = -1;
        let currentCustomerSuggestions = [];

        const normalizeMoney = (value) => {
            const parsed = Number.parseFloat(value || '0');
            if (!Number.isFinite(parsed) || parsed < 0) {
                return 0;
            }
            return Math.round(parsed * 100) / 100;
        };

        const updateRemainingBalance = () => {
            const estimated = normalizeMoney(estimatedInput.value);
            const paid = normalizeMoney(paidInput.value);
            const remaining = Math.max(estimated - paid, 0);
            remainingInput.value = remaining.toFixed(2);
        };

        const updateFilename = () => {
            if (!imageFilename) {
                return;
            }
            const selectedFile = imageInput?.files?.[0];
            imageFilename.textContent = selectedFile ? selectedFile.name : imageFilename.dataset.originalName || defaultImageText;
        };

        if (imageFilename) {
            imageFilename.dataset.originalName = imageFilename.textContent.trim();
        }

        const customerDisplayLabel = (customer) => {
            if (!customer) {
                return '';
            }
            if (customer.displayLabel) {
                return customer.displayLabel;
            }
            return customer.primaryPhone
                ? `${customer.fullName} - ${customer.primaryPhone}`
                : (customer.secondaryPhone
                    ? `${customer.fullName} - ${customer.secondaryPhone}`
                    : customer.fullName);
        };

        const customerPhoneLabel = (customer) => {
            const phones = [customer.primaryPhone, customer.secondaryPhone].filter(Boolean);
            return phones.length > 0 ? phones.join(' • ') : customerNoPhoneText;
        };

        const openCustomerSuggestions = () => {
            customerSuggestions.hidden = false;
            customerQueryInput.setAttribute('aria-expanded', 'true');
        };

        const closeCustomerSuggestions = () => {
            customerSuggestions.hidden = true;
            customerSuggestions.innerHTML = '';
            customerQueryInput.setAttribute('aria-expanded', 'false');
            activeCustomerIndex = -1;
            currentCustomerSuggestions = [];
        };

        const renderCustomerState = (message) => {
            customerSuggestions.innerHTML = '';
            const state = document.createElement('div');
            state.className = 'autocomplete-panel__state';
            state.textContent = message;
            customerSuggestions.appendChild(state);
            openCustomerSuggestions();
        };

        const renderSelectedCustomer = (customer) => {
            selectedCustomer = {
                ...customer,
                displayLabel: customerDisplayLabel(customer)
            };
            customerIdInput.value = customer.id;
            customerQueryInput.value = selectedCustomer.displayLabel;
            selectedCustomerCard.hidden = false;
            selectedCustomerName.textContent = customer.fullName || '';
            selectedCustomerPhones.textContent = customerPhoneLabel(customer);
            clearCustomerButton.hidden = false;
        };

        const clearSelectedCustomer = (preserveQuery = false) => {
            selectedCustomer = null;
            customerIdInput.value = '';
            selectedCustomerCard.hidden = true;
            selectedCustomerName.textContent = '';
            selectedCustomerPhones.textContent = '';
            clearCustomerButton.hidden = true;
            if (!preserveQuery) {
                customerQueryInput.value = '';
            }
        };

        const highlightCustomerSuggestion = () => {
            customerSuggestions.querySelectorAll('.autocomplete-option').forEach((option, index) => {
                option.classList.toggle('is-active', index === activeCustomerIndex);
            });
        };

        const chooseCustomer = (customer) => {
            renderSelectedCustomer(customer);
            closeCustomerSuggestions();
            quickAddPanel.hidden = true;
            quickAddGeneralError.hidden = true;
            resetQuickCustomerForm();
        };

        const renderCustomerSuggestions = (suggestions) => {
            customerSuggestions.innerHTML = '';
            currentCustomerSuggestions = suggestions;
            activeCustomerIndex = -1;

            if (suggestions.length === 0) {
                renderCustomerState(customerSearchEmptyText);
                return;
            }

            suggestions.forEach((customer, index) => {
                const option = document.createElement('button');
                option.type = 'button';
                option.className = 'autocomplete-option';
                option.dataset.index = String(index);

                const topRow = document.createElement('div');
                topRow.className = 'autocomplete-option__top';

                const titleGroup = document.createElement('div');
                titleGroup.className = 'autocomplete-option__title-group';

                const name = document.createElement('strong');
                name.className = 'autocomplete-option__customer';
                name.textContent = customer.fullName;

                const phones = document.createElement('span');
                phones.className = 'autocomplete-option__phone';
                phones.textContent = customerPhoneLabel(customer);

                titleGroup.appendChild(name);
                titleGroup.appendChild(phones);
                topRow.appendChild(titleGroup);

                option.appendChild(topRow);
                option.addEventListener('click', () => chooseCustomer(customer));
                customerSuggestions.appendChild(option);
            });

            openCustomerSuggestions();
        };

        const fetchCustomerSuggestions = async (value) => {
            if (customerAbortController) {
                customerAbortController.abort();
            }

            customerAbortController = new AbortController();
            renderCustomerState(customerSearchLoadingText);

            try {
                const response = await fetch(`${customerSuggestionsUrl}?q=${encodeURIComponent(value)}`, {
                    headers: {
                        'Accept': 'application/json'
                    },
                    credentials: 'same-origin',
                    signal: customerAbortController.signal
                });

                if (!response.ok) {
                    closeCustomerSuggestions();
                    return;
                }

                renderCustomerSuggestions(await response.json());
            } catch (error) {
                if (error.name !== 'AbortError') {
                    closeCustomerSuggestions();
                }
            }
        };

        const quickCustomerFields = {
            fullName: form.querySelector('[data-quick-customer-field="fullName"]'),
            primaryPhone: form.querySelector('[data-quick-customer-field="primaryPhone"]'),
            secondaryPhone: form.querySelector('[data-quick-customer-field="secondaryPhone"]'),
            notes: form.querySelector('[data-quick-customer-field="notes"]')
        };

        const clearQuickCustomerErrors = () => {
            Object.keys(quickCustomerFields).forEach((fieldName) => {
                const errorNode = form.querySelector(`[data-quick-customer-error="${fieldName}"]`);
                if (errorNode) {
                    errorNode.hidden = true;
                    errorNode.textContent = '';
                }
            });
            quickAddGeneralError.hidden = true;
            quickAddGeneralError.textContent = '';
        };

        const resetQuickCustomerForm = () => {
            Object.values(quickCustomerFields).forEach((field) => {
                if (field) {
                    field.value = '';
                }
            });
            clearQuickCustomerErrors();
        };

        const prefillQuickCustomerForm = () => {
            const query = customerQueryInput.value.trim();
            if (!query) {
                return;
            }

            const digits = query.replace(/\D+/g, '');
            if (digits.length >= 5 && !quickCustomerFields.primaryPhone.value) {
                quickCustomerFields.primaryPhone.value = query;
            } else if (!quickCustomerFields.fullName.value) {
                quickCustomerFields.fullName.value = query;
            }
        };

        const openQuickCustomerPanel = () => {
            closeCustomerSuggestions();
            quickAddPanel.hidden = false;
            clearQuickCustomerErrors();
            prefillQuickCustomerForm();
            quickCustomerFields.fullName.focus();
        };

        const buildQuickCustomerPayload = () => {
            const payload = new URLSearchParams();
            if (csrfInput?.name && csrfInput?.value) {
                payload.append(csrfInput.name, csrfInput.value);
            }
            Object.entries(quickCustomerFields).forEach(([fieldName, field]) => {
                payload.append(fieldName, field.value);
            });
            return payload;
        };

        const submitQuickCustomer = async () => {
            clearQuickCustomerErrors();
            quickAddSubmitButton.disabled = true;

            try {
                const response = await fetch(customerQuickAddUrl, {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8'
                    },
                    credentials: 'same-origin',
                    body: buildQuickCustomerPayload().toString()
                });

                const payload = await response.json();
                if (response.ok && payload.success && payload.customer) {
                    chooseCustomer(payload.customer);
                    return;
                }

                const errors = payload.errors || {};
                let hasFieldError = false;
                Object.entries(errors).forEach(([fieldName, message]) => {
                    const errorNode = form.querySelector(`[data-quick-customer-error="${fieldName}"]`);
                    if (errorNode) {
                        errorNode.hidden = false;
                        errorNode.textContent = message;
                        hasFieldError = true;
                    }
                });

                if (!hasFieldError) {
                    quickAddGeneralError.hidden = false;
                    quickAddGeneralError.textContent = errors.general || quickAddErrorText;
                }
            } catch (error) {
                quickAddGeneralError.hidden = false;
                quickAddGeneralError.textContent = quickAddErrorText;
            } finally {
                quickAddSubmitButton.disabled = false;
            }
        };

        customerQueryInput?.addEventListener('input', () => {
            if (selectedCustomer && customerQueryInput.value.trim() !== customerDisplayLabel(selectedCustomer)) {
                clearSelectedCustomer(true);
            }

            if (customerDebounceHandle) {
                window.clearTimeout(customerDebounceHandle);
            }

            const query = customerQueryInput.value.trim();
            if (query.length < 2) {
                closeCustomerSuggestions();
                return;
            }

            customerDebounceHandle = window.setTimeout(() => {
                fetchCustomerSuggestions(query);
            }, 160);
        });

        customerQueryInput?.addEventListener('keydown', (event) => {
            if (customerSuggestions.hidden || currentCustomerSuggestions.length === 0) {
                return;
            }

            if (event.key === 'ArrowDown') {
                event.preventDefault();
                activeCustomerIndex = (activeCustomerIndex + 1) % currentCustomerSuggestions.length;
                highlightCustomerSuggestion();
            } else if (event.key === 'ArrowUp') {
                event.preventDefault();
                activeCustomerIndex = (activeCustomerIndex - 1 + currentCustomerSuggestions.length) % currentCustomerSuggestions.length;
                highlightCustomerSuggestion();
            } else if (event.key === 'Enter' && activeCustomerIndex >= 0) {
                event.preventDefault();
                chooseCustomer(currentCustomerSuggestions[activeCustomerIndex]);
            } else if (event.key === 'Escape') {
                closeCustomerSuggestions();
            }
        });

        clearCustomerButton?.addEventListener('click', () => {
            clearSelectedCustomer();
            customerQueryInput.focus();
        });

        quickAddOpenButton?.addEventListener('click', openQuickCustomerPanel);
        quickAddCancelButton?.addEventListener('click', () => {
            quickAddPanel.hidden = true;
            resetQuickCustomerForm();
            customerQueryInput.focus();
        });
        quickAddSubmitButton?.addEventListener('click', submitQuickCustomer);

        document.addEventListener('click', (event) => {
            if (!form.contains(event.target) || !event.target.closest('[data-customer-picker]')) {
                closeCustomerSuggestions();
            }
        });

        estimatedInput?.addEventListener('input', updateRemainingBalance);
        paidInput?.addEventListener('input', updateRemainingBalance);
        imageInput?.addEventListener('change', updateFilename);
        updateRemainingBalance();
    })();
</script>
</body>
</html>
