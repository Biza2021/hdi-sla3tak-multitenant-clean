spring:
  datasource:
    url: ${APP_DATASOURCE_URL:jdbc:postgresql://localhost:5432/benchpilot}
    username: ${APP_DATASOURCE_USERNAME:postgres}
    password: ${APP_DATASOURCE_PASSWORD:postgres}
  messages:
    basename: messages
    encoding: UTF-8
    fallback-to-system-locale: false
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  thymeleaf:
    cache: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  flyway:
    enabled: true
app:
  storage:
    repair-images-root: ${APP_REPAIR_IMAGES_ROOT:./var/repair-images}
server:
  servlet:
    session:
      timeout: 12h
      cookie:
        same-site: lax
